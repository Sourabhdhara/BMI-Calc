<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator | Smart Health Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-wrapper">
            <div class="bmi-logo">
                <div class="logo-icon">📏</div>
                <div class="logo-text">BMI<span>Calc</span></div>
            </div>
        </div>

        <div class="calculator-card">
            <h1>Body Mass Index Calculator</h1>
            <p class="subtitle">Enter your details to get your BMI and health category</p>

            <div class="input-group">
                <label>⚖️ Weight (kg)</label>
                <input type="number" id="weight" step="0.1" placeholder="e.g., 70" value="70">
                <small>Range: 20 – 300 kg</small>
            </div>

            <div class="input-group">
                <label>📏 Height (cm)</label>
                <input type="number" id="height" step="0.5" placeholder="e.g., 170" value="170">
                <small>Range: 50 – 250 cm</small>
            </div>

            <button id="calculateBtn" class="btn-calculate">Calculate BMI</button>

            <!-- Result Card (hidden initially) -->
            <div id="resultCard" class="result-card hidden">
                <div class="bmi-display">
                    <span class="bmi-value">--</span>
                    <span class="bmi-label">BMI</span>
                </div>
                <div class="category-pill" id="categoryPill">—</div>
                <div class="health-note" id="healthNote"></div>
                <button id="downloadDocBtn" class="btn-download">📄 Download Result as DOC</button>
            </div>

            <div id="errorMsg" class="error-message hidden"></div>
        </div>

        <footer>
            <p>⚠️ BMI is a screening tool, not a diagnostic of body fatness.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
